# SPA serving config: every non-file path falls back to index.html so
# React Router owns routing (without this, refreshing /courses/1 404s).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx's bundled mime.types doesn't reliably map .webmanifest, and a
    # manifest served as application/octet-stream is ignored by browsers --
    # which silently costs the app its installability.
    types {
        application/manifest+json webmanifest;
    }
    include /etc/nginx/mime.types;

    gzip on;
    gzip_types text/css application/javascript application/json
               application/manifest+json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The app shell and the service worker are the two files that must
    # never be served stale: a cached index.html pins users to an old
    # asset manifest, and a cached sw.js means the update prompt never
    # appears no matter how many times the app is redeployed.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
