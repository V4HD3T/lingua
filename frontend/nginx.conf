# SPA serving config: every non-file path falls back to index.html so
# React Router owns routing (without this, refreshing /courses/1 404s).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; cache them hard. index.html is
    # deliberately NOT covered so deploys show up on refresh.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
