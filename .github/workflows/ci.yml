# Regression net for every push and pull request: the full backend test
# suite (with a coverage floor) and a frontend type-check + production
# build. Complements security-scan.yml, which handles dependency auditing
# on its own schedule -- this workflow answers "does the code still work",
# that one answers "are the dependencies still safe".
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      # The floor (88%) sits deliberately below the current 94% so a
      # legitimately hard-to-test addition doesn't block a push, while a
      # real collapse in coverage still fails loudly. Ratchet it up as
      # coverage grows; never ratchet it down to make a failure pass.
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=88

  frontend-build:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        # Node 22: Vite 8's engine floor is >=20.19 / >=22.12, and GitHub
        # is retiring Node 20 runners anyway.
        run: npm ci
      # "npm run build" is tsc -b && vite build, so this is both the
      # type-check (the frontend's only automated correctness signal until
      # the v0.1.x test versions) and proof the production bundle builds.
      - name: Run unit tests (Vitest)
        run: npm test
      - name: Type-check and build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      # Browser download is blocked in the local dev sandbox (documented in
      # TESTING.md); CI is where this suite actually executes.
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
