name: Dependency security scan

# Runs on every push/PR so a newly-disclosed vulnerability in a dependency
# shows up as a CI failure, not as something someone has to remember to
# check for manually. Each job is allowed to fail without blocking the
# other -- a frontend advisory shouldn't hide a backend one or vice versa.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Also run weekly on a schedule: a dependency that was clean when last
    # pushed can still grow a newly-disclosed vulnerability with no code
    # change on our side at all.
    - cron: "0 6 * * 1"

jobs:
  backend-audit:
    name: Backend (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pip-audit
        working-directory: backend
        run: pipx run pip-audit -r requirements.txt

  frontend-audit:
    name: Frontend (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run npm audit
        working-directory: frontend
        # --audit-level=high as policy: moderate dev-tooling advisories
        # get triaged (assessed, documented, then fixed or consciously
        # deferred) rather than auto-blocking every push; high/critical
        # findings fail the build. As of the post-v0.0.9 dependency
        # response the tree is fully clean -- this gate exists to catch
        # the next disclosure.
        run: npm audit --audit-level=high
